<style>
/* =========================
   HEADER LOGO FIX
========================= */

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.brand img{
  width:235px;
  height:auto;
  max-height:52px;
  object-fit:contain;
  display:block;
}

/* Mobile logo */
@media(max-width:768px){
  .brand img{
    width:185px;
    max-height:44px;
  }
}

/* =========================
   HERO BACKGROUND FADE FIX
========================= */

.hero-right{
  background:
    linear-gradient(
      90deg,
      rgba(255,248,244,0.80) 0%,
      rgba(255,248,244,0.56) 34%,
      rgba(255,248,244,0.10) 60%,
      rgba(255,248,244,0.00) 100%
    ),
    url("images/hero-reception.png") center center / cover no-repeat;
}

/* Slight image enhancement */
.hero-right{
  filter:saturate(1.02) contrast(1.02);
}

/* =========================
   OPTIONAL HEADER POLISH
========================= */

header{
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}

.navbar{
  min-height:78px;
}

.call-btn{
  border-radius:14px;
  font-weight:600;
  box-shadow:0 6px 18px rgba(219,119,139,.18);
}

/* =========================
   HERO TEXT
========================= */

.hero-title{
  line-height:1.08;
  letter-spacing:-1px;
}

.hero-title span{
  color:#d97b8f;
}

/* =========================
   SERVICE CARD POLISH
========================= */

.service-card{
  transition:all .28s ease;
}

.service-card:hover{
  transform:translateY(-5px);
  box-shadow:0 18px 38px rgba(0,0,0,.10);
}

/* =========================
   GENERAL LUXURY LOOK
========================= */

body{
  background:#f8f4f1;
}

section{
  position:relative;
}

.container{
  width:min(1200px,92%);
  margin:auto;
}
</style>
